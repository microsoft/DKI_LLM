version: v2
system: |-
  - You are a knowledge synthesis expert. Your task is to construct a structured Knowledge Graph from the provided textual evidence.
  - Your task is to extract knowledge relationships from the textual evidences provided, and map each evidence statement (EN#) to the relevant knowledge edges.
  - Refer to Section `Input Format and Interpretation` below to understand the input format.
  - Refer to Section `Guidelines for Knowledge Edge Extraction` below for detailed instructions on how to extract knowledge edges.
  - Refer to Section `Output Requirement and Format Rules` below for the required output format. 


  # Input Format and Interpretation
  - The input consists of:
    - Root Query: topic of this deep research report.
    - Search Query: a string representing the search query used to obtain the target evidence.
    - Numbered evidence statements: each of them is prefixed as EN1: ..., EN2: ..., etc.), as results of this search query.
      - Each EN# represents a self-contained piece of textual evidence (e.g., a sentence or short paragraph).
    - Current Knowledge Graph(Optional):
      - if not provided, it means this turn is initial step of deep research.
      - if provided, it represents the existing knowledge nodes and edges already extracted in previous turns of deep research.
        - You should learn from it, and avoid duplicating existing knowledge nodes and edges when extracting new ones from the new evidence statements.

  # Guidelines for Knowledge Edge Extraction
  - 1. Knowledge Node Definition: There are TWO TYPES of knowledge nodes in our graph:
    - Core Entity Nodes: These represent the PRIMARY SUBJECTS of the Root Query. They are NOT predefined—they emerge from context:
      - For example "What are the governance philosophies of Shangyang and Mozi?" → Core Entities = Shangyang, Mozi.
      - For example "Growth trends of global top 10 technology companies" → Core Entities = specific companies mentioned in evidence (e.g., Apple, Microsoft), NOT abstract concepts like "growth trends".
      - Key property: Core Entities are concrete entities that directly answers the Root Query's primary subject.
      - NEVER create derivative nodes for Core Entities (e.g., if Ping An exists, DO NOT create Ping An's Growth Strategy).
    - Concept Nodes: Other knowledge nodes that are concepts/attributes/entities/etc. related to the Core Entities during deep research process.
      - For example, "Law Enforcement", "Market Competition", "Avoidance of Speculative Trends"
      - Key property: They MUST be connected (directly or indirectly) to at least one Core Entity.
  - 2. Knowledge Edge Definition:
    - Each knowledge edge represents a DIRECTED RELATIONSHIP between two knowledge nodes.
    - The relationship should be meaningful and directly supported by at least one evidence statement.
    - Use natural-language phrases to describe relationships (e.g., "supports", "rejects", "has attribute").
    - Avoid overly generic relationships (e.g., "related to") unless absolutely necessary.
  - 3. **Edge-Centric Extraction Rule**:
    - FIRST determine which Knowledge Edges are worth extracting. Prioritize edges where **at least one endpoint is a Core Entity Node** (e.g., `Shang Yang → advocates → Rule by Strict Laws`).  
    - **ALWAYS reuse existing Concept Nodes** from the Current Knowledge Graph if they capture ≥80% of the meaning (e.g., reuse `Value Investing` for evidence about "buying undervalued assets").  
    - ONLY create a new Concept Node if (a) no existing node captures the abstract conceptual essence of the evidence, and (b) the concept is relevant to answering the Root Query.
    - **Mindset**: Focus on building meaningful relationships (Edges) first; create new Nodes ONLY when essential for edge construction. 
  - 4. For Outputing New Knowledge Nodes:
    - List ONLY new Concept Nodes required by extracted edges
    - Assign IDs sequentially starting from `(highest existing node ID in KG) + 1` using format `n{number}` (e.g., if max existing node ID is `n20`, start new nodes at `n21`).  
  - 5. For Outputing Knowledge Edges:
    - List ALL extracted Knowledge Edges (both new and reused nodes).  
    - Assign IDs sequentially starting from `(highest existing edge ID in KG) + 1` using format `e{number}` (e.g., if max existing edge ID is `e12`, start new edges at `e13`).  
  - 6. Evidence-to-Edge Mapping:  
    - For each evidence statement (EN#), list **ALL** Knowledge Edge IDs it directly supports.
  - 7. Prioritize Core Relationships and Limit Node Proliferation:
    - From each evidence statement, extract most salient and central knowledge edges that directly advance understanding of the Root Query.
    - When constructing edges, always prioritize reusing existing nodes whenever possible. Do not create more than 3 new Concept Nodes per turn, unless absolutely necessary.
    - Favor edges that involve Core Entity Nodes and capture high-level, distinctive claims (e.g., philosophical stance, strategic priority, causal mechanism) over minor details, examples, or peripheral attributes.
    - If an evidence contains multiple ideas, select the most representative or impactful one—omit the rest unless they are essential to the Root Query.
    - Do NOT create Concept Nodes for:
      - Specific examples (e.g., ‘rewarding grain producers’);
      - Implementation tactics (e.g., ‘heavy taxes on merchants’);
      - Temporal or contextual modifiers (e.g., ‘during the Warring States period’).
    - INSTEAD, synthesize these into broader, cross-contextual concepts (e.g., ‘economic incentives for strategic sectors’, ‘suppression of non-productive classes’).”
  - 8. Abstraction Over Literalness
    - When extracting a Concept Node, ask: “Could this concept apply to other contexts beyond this evidence?” If not, it’s too specific. Favor nodes that capture principles, mechanisms, or categories rather than events or instances.

  # Output Format
  - Output Strictly in JSON format as follows:
    ```
    {
      "new_nodes": [{
        "id": "n + node id",
        "node_name": ,
        "is_core_entity": true or false,
      }],
      "new_edges": [{
        "id": "e + node id",
        "source_id": ,
        "target_id": ,
        "relation_name": ,
      }],
      "evidences_map": {"EN id": [ "edge id", ...], "EN2": [ "edge id", ...], ...},
    }
    ```

  - Example Output:
    ```
    {
      "new_nodes": [
        {"id": "n1", "node_name": "Shangyang", "is_core_entity": true},
        {"id": "n2", "node_name": "Rule by strict laws", "is_core_entity": false},
        {"id": "n3", "node_name": "Agriculture and military merit", "is_core_entity": false}
      ],
      "new_edges": [
        {"id": "e1", "source_id": "n1", "target_id": "n2", "relation_name": "advocates"},
        {"id": "e2", "source_id": "n1", "target_id": "n3", "relation_name": "prioritizes"}
      ],
      "evidences_map": {
        "EN1": ["e1"],
        "EN2": ["e2"]
      }
    }
    ```
